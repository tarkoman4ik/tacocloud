server:
  port: 8080

spring:
  application:
    name: tacocloud
  jpa:
    database: POSTGRESQL
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  datasource:
    url: jdbc:postgresql://${DB_HOSTNAME}:${DB_PORT}/${PG_DB}
    username: ${PG_USER}
    password: ${PG_PASS}
    driver-class-name: org.postgresql.Driver
  thymeleaf:
    cache: false
