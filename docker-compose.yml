version: '3.8'
services:
  taco-db:
    image: postgres:17
    container_name: taco-db
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_DB: ${PG_DB}

  tacoapp:
    container_name: tacoapp
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      taco-db:
        condition: service_healthy
        restart: true
